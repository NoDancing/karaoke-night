<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Karaoke Night — Host</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d0d0d;
      color: #fff;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 24px;
    }
    h1 { font-size: 2rem; margin-bottom: 8px; letter-spacing: 2px; }
    #now-playing {
      font-size: 1.2rem;
      color: #f0c040;
      margin-bottom: 16px;
      min-height: 1.5em;
    }
    #player-wrapper {
      width: 100%;
      max-width: 860px;
      aspect-ratio: 16/9;
      background: #111;
      margin-bottom: 24px;
    }
    #player-wrapper iframe {
      width: 100%;
      height: 100%;
    }
    #idle-msg {
      display: none;
      font-size: 1.4rem;
      color: #888;
      text-align: center;
      padding: 40px;
    }
    #queue-section { width: 100%; max-width: 860px; }
    #queue-section h2 { font-size: 1rem; color: #888; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }
    #queue-list { list-style: none; }
    #queue-list li {
      padding: 10px 14px;
      border-bottom: 1px solid #222;
      display: flex;
      justify-content: space-between;
    }
    #queue-list li .singer { color: #f0c040; }
    #queue-list li .url { color: #555; font-size: 0.85rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 60%; }
    #qr-box {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #fff;
      padding: 10px;
      border-radius: 8px;
      text-align: center;
    }
    #qr-box p { color: #000; font-size: 0.75rem; margin-top: 6px; font-weight: bold; }
  </style>
</head>
<body>
  <h1 id="event-title">Karaoke Night</h1>
  <div id="now-playing">Loading queue...</div>
  <div id="player-wrapper">
    <div id="yt-player"></div>
  </div>
  <div id="idle-msg">No songs in the queue yet. Have guests add songs!</div>
<div id="qr-box">
    <div id="qr-code"></div>
    <p>Scan to add a song</p>
  </div>
  <section id="queue-section">
    <h2>Up Next</h2>
    <ul id="queue-list"></ul>
  </section>

  <script>
    let player = null;
    let playerReady = false;
    let currentSong = null;
    let queue = [];
    let advancing = false;

    function extractVideoId(url) {
      const m = url.match(/(?:v=|youtu\.be\/)([A-Za-z0-9_-]{11})/);
      return m ? m[1] : null;
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

function renderUpNext() {
      const list = document.getElementById('queue-list');
      list.innerHTML = queue.slice(1).map(s =>
        `<li><span class="singer">${escHtml(s.singer)}</span><span class="url">${escHtml(s.url)}</span></li>`
      ).join('');
    }

    function showIdle() {
      document.getElementById('now-playing').textContent = '';
      document.getElementById('player-wrapper').style.display = 'none';
      document.getElementById('idle-msg').style.display = 'block';
      document.getElementById('queue-list').innerHTML = '';
    }

    function showPlayer() {
      document.getElementById('player-wrapper').style.display = 'block';
      document.getElementById('idle-msg').style.display = 'none';
    }

    async function removeCurrent() {
      if (!currentSong) return;
      await fetch(`/queue/${currentSong.id}`, { method: 'DELETE' });
      currentSong = null;
    }

    async function fetchQueue() {
      const res = await fetch('/queue');
      queue = await res.json();
    }

    async function playNext() {
      if (advancing || !playerReady) return;
      advancing = true;
      try {
        await fetchQueue();
        if (queue.length === 0) {
          currentSong = null;
          showIdle();
          return;
        }
        const song = queue[0];
        const videoId = extractVideoId(song.url);
        if (!videoId) {
          await fetch(`/queue/${song.id}`, { method: 'DELETE' });
          advancing = false;
          return playNext();
        }
        showPlayer();
        currentSong = song;
        document.getElementById('now-playing').textContent = `Now singing: ${currentSong.singer}`;
        renderUpNext();
        player.loadVideoById(videoId);
      } finally {
        advancing = false;
      }
    }

    // YouTube IFrame API
    window.onYouTubeIframeAPIReady = function () {
      player = new YT.Player('yt-player', {
        height: '100%',
        width: '100%',
        playerVars: { autoplay: 1, controls: 1, rel: 0 },
        events: {
          onReady: () => {
            playerReady = true;
            playNext();
          },
          onStateChange: async (e) => {
            if (e.data === YT.PlayerState.ENDED) {
              await removeCurrent();
              await playNext();
            }
          },
        },
      });
    };

    // WebSocket for real-time queue updates
    function connectWS() {
      const wsProto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const ws = new WebSocket(`${wsProto}//${location.host}/ws`);
      ws.onmessage = (e) => {
        const data = JSON.parse(e.data);
        queue = data.queue;
        document.getElementById('event-title').textContent = '' + data.title;
        if (!currentSong && queue.length > 0) {
          playNext();
        } else {
          renderUpNext();
        }
      };
      ws.onclose = () => setTimeout(connectWS, 2000);
    }
    connectWS();

    // Fallback poll every 10s when idle
    setInterval(async () => {
      if (!currentSong) playNext();
    }, 10000);
  </script>
  <script src="https://www.youtube.com/iframe_api"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script>
    const guestUrl = `${location.protocol}//${location.host}/guest`;
    new QRCode(document.getElementById('qr-code'), {
      text: guestUrl,
      width: 120,
      height: 120,
      colorDark: '#000',
      colorLight: '#fff',
    });
  </script>
</body>
</html>
